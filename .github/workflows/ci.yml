name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Integration tests (live API) are intentionally NOT run in CI — they're
      # network-dependent. Run locally with `npm run test:integration`.
