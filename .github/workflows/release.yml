name: Release

# Publishes @supstack/cli to npm when a v* tag is pushed, e.g.:
#   npm version patch && git push --follow-tags
#
# Auth uses npm Trusted Publishing (OIDC) — NO long-lived npm token. The
# `id-token: write` permission lets this workflow mint a short-lived OIDC
# credential that npm trusts, and provenance (the verifiable supply-chain
# attestation / npm "provenance" badge) is generated automatically.
#
# ONE-TIME SETUP on npmjs.com → @supstack/cli → Settings → Trusted Publisher:
#   Provider: GitHub Actions · Org/User: DrBaher · Repo: supstack-cli
#   Workflow: release.yml   (Environment: leave blank)
# Once configured, no NPM_TOKEN secret is needed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm ci

      # Gate the release on the same checks CI runs. (npm publish also triggers
      # prepublishOnly = type-check + test and prepack = build, but failing here
      # gives a clearer signal before anything is pushed to the registry.)
      - name: Verify
        run: |
          npm run lint
          npm run type-check
          npm test
          npm run build

      # No NODE_AUTH_TOKEN: authentication comes from the OIDC id-token, and
      # provenance is attached automatically under trusted publishing.
      - name: Publish
        run: npm publish --access public
